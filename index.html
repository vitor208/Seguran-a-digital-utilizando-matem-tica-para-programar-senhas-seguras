<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Gerador de Senha</h2>
        
        <div class="password-container">
            <div class="password-display" id="passwordScreen">Clique em Gerar</div>
            <button class="copy-btn" onclick="copyPassword()" title="Copiar Senha">📋</button>
        </div>

        <button class="generate-btn" onclick="generatePassword()">Gerar Senha Forte</button>
    </div>

    <script>
        function generatePassword() {
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
            const passwordLength = 14; 
            let password = "";

            for (let i = 0; i < passwordLength; i++) {
                const randomNumber = Math.floor(Math.random() * chars.length);
                password += chars.substring(randomNumber, randomNumber + 1);
            }

            document.getElementById("passwordScreen").innerText = password;
        }

        function copyPassword() {
            const passwordText = document.getElementById("passwordScreen").innerText;

            // Evita copiar o texto inicial padrão
            if (passwordText === "Clique em Gerar") {
                alert("Gere uma senha primeiro!");
                return;
            }

            // Copia o texto para a área de transferência
            navigator.clipboard.writeText(passwordText).then(() => {
                alert("Senha copiada para a área de transferência!");
            }).catch(err => {
                console.error("Erro ao copiar: ", err);
            });
        }
    </script>

</body>
</html>
